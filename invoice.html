<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>CK转发票</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f6fa;
            padding: 40px;
        }

        .container {
            max-width: 720px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 90px;
            margin-top: 8px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: vertical;
        }

        button {
            margin-top: 15px;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background: #3c8dbc;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #367fa9;
        }

        .copy {
            background: #00a65a;
            margin-left: 10px;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>腾讯CK转发票链接</h2>

    <label>CK链接</label>
    <textarea id="ckInput" placeholder="粘贴CK链接"></textarea>
    <button onclick="convert()">生成发票链接</button>

    <label style="margin-top:20px;display:block;">发票链接</label>
    <textarea id="result" readonly placeholder="生成的发票链接会显示在这里"></textarea>
    <button class="copy" onclick="copyLink()">复制发票链接</button>

</div>

<script>

    async function convert() {
        const ck = document.getElementById("ckInput").value.trim();
        if (!ck) {
            alert("请输入 CK 链接");
            return;
        }
        try {
            const resp = await fetch("/api/invoice", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    ck: ck
                })
            });
            const data = await resp.json();
            if (data.url) {
                document.getElementById("result").value = data.url;
            } else {
                alert("生成失败：" + (data.error || "未知错误"));
            }
        } catch (e) {
            alert("请求接口失败");
        }
    }

    function copyLink() {
        const text = document.getElementById("result");
        if (!text.value) {
            alert("没有可复制的链接");
            return;
        }
        text.select();
        document.execCommand("copy");
        alert("已复制");
    }
</script>
</body>
</html>
